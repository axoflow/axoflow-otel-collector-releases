# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
project_name: axoflow-otel-collector-releases
env:
  - COSIGN_YES=true
  - LD_FLAGS=-s -w
  - BUILD_FLAGS=-trimpath
  - GOPROXY=https://proxy.golang.org,direct
  - CGO_ENABLED=0
release:
  replace_existing_artifacts: true
msi:
  - id: axoflow-otel-collector
    name: axoflow-otel-collector_{{ .Version }}_{{ .Os }}_{{ .MsiArch }}
    wxs: windows-installer.wxs
    extra_files:
      - axoflow.ico
      - README_windows.md
      - windows_config.yaml
      - etw_library_license.txt
      - gofalcon_library_license.txt
builds:
  - id: axoflow-otel-collector-linux
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    dir: _build
    binary: axoflow-otel-collector
    ldflags:
      - '{{ .Env.LD_FLAGS }}'
    flags:
      - '{{ .Env.BUILD_FLAGS }}'
  - id: axoflow-otel-collector-windows
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    dir: _build
    binary: axoflow-otel-collector
    ldflags:
      - '{{ .Env.LD_FLAGS }}'
    flags:
      - '{{ .Env.BUILD_FLAGS }}'
archives:
  - id: axoflow-otel-collector
    ids:
      - axoflow-otel-collector-linux
      - axoflow-otel-collector-windows
    name_template: '{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{ if .Mips }}_{{ .Mips }}{{ end }}'
    files:
      - src: README_{{.Os}}.md
nfpms:
  - package_name: axoflow-otel-collector
    contents:
      - src: axoflow-otel-collector.service
        dst: /lib/systemd/system/axoflow-otel-collector.service
      - src: axoflow-otel-collector.conf
        dst: /etc/axoflow-otel-collector/axoflow-otel-collector.conf
        type: config|noreplace
      - src: linux_config.yaml
        dst: /etc/axoflow-otel-collector/config.yaml
        type: config|noreplace
      - src: etw_library_license.txt
        dst: /etc/axoflow-otel-collector/etw_library_license.txt
      - src: gofalcon_library_license.txt
        dst: /etc/axoflow-otel-collector/gofalcon_library_license.txt
    scripts:
      preinstall: preinstall.sh
      postinstall: postinstall.sh
      preremove: preremove.sh
    overrides:
      rpm:
        dependencies:
          - /bin/sh
    id: axoflow-otel-collector
    ids:
      - axoflow-otel-collector-linux
    formats:
      - deb
      - rpm
    maintainer: The Axoflow Otel-Collector maintainers <support@axoflow.com>
    description: Axoflow Otel-Collector Distribution
    license: Apache 2.0
checksum:
  name_template: '{{ .ProjectName }}_{{ if eq .Runtime.Goos "windows" }}_{{ .Runtime.Goos }}{{ end }}_checksums.txt'
signs:
  - cmd: cosign
    args:
      - sign-blob
      - --output-signature
      - ${artifact}.sig
      - --output-certificate
      - ${artifact}.pem
      - ${artifact}
    signature: ${artifact}.sig
    artifacts: all
    if: '{{ eq .Os "linux" }}'
    certificate: ${artifact}.pem
docker_signs:
  - args:
      - sign
      - ${artifact}
    artifacts: all
sboms:
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package
monorepo:
  tag_prefix: v
partial:
  by: target
dockers:
  - goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/axoflow/axoflow-otel-collector/axoflow-otel-collector:{{ .Version }}-amd64
    extra_files:
      - linux_config.yaml
      - etw_library_license.txt
      - gofalcon_library_license.txt
    build_flag_templates:
      - --pull
      - --platform=linux/amd64
      - --label=org.opencontainers.image.created={{.Date}}
      - --label=org.opencontainers.image.name={{.ProjectName}}
      - --label=org.opencontainers.image.revision={{.FullCommit}}
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.source={{.GitURL}}
      - --label=org.opencontainers.image.licenses=Apache-2.0
    use: buildx
  - goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/axoflow/axoflow-otel-collector/axoflow-otel-collector:{{ .Version }}-arm64
    extra_files:
      - linux_config.yaml
      - etw_library_license.txt
      - gofalcon_library_license.txt
    build_flag_templates:
      - --pull
      - --platform=linux/arm64
      - --label=org.opencontainers.image.created={{.Date}}
      - --label=org.opencontainers.image.name={{.ProjectName}}
      - --label=org.opencontainers.image.revision={{.FullCommit}}
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.source={{.GitURL}}
      - --label=org.opencontainers.image.licenses=Apache-2.0
    use: buildx
docker_manifests:
  - name_template: ghcr.io/axoflow/axoflow-otel-collector/axoflow-otel-collector:{{ .Version }}
    image_templates:
      - ghcr.io/axoflow/axoflow-otel-collector/axoflow-otel-collector:{{ .Version }}-amd64
      - ghcr.io/axoflow/axoflow-otel-collector/axoflow-otel-collector:{{ .Version }}-arm64
