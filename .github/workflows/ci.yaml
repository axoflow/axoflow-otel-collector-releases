name: CI - Collector Binaries

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GONOSUMDB: github.com/axoflow/*
  GOPRIVATE: github.com/axoflow/*

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "~1.25.0"
          check-latest: true

      - name: Tidy go.mod files
        run: go mod tidy

      - name: Setup private module access
        env:
          DEPLOY_KEY_PRIVATE_FOR_AXO_ETW: ${{ secrets.DEPLOY_KEY_PRIVATE_FOR_AXO_ETW}}
        run: ./scripts/prepare-private-modules-gha.sh

      - name: Verify
        run: make ci
