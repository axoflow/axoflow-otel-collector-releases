name: CI - Collector Binaries

on:
  merge_group:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main, release/*]

env:
  GONOSUMDB: github.com/axoflow/*
  GOPRIVATE: github.com/axoflow/*

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "~1.26.0"
          check-latest: true

      - name: Tidy go.mod files
        run: go mod tidy

      - name: Setup private module access
        env:
          DEPLOY_KEY_PRIVATE_FOR_AXO_ETW: ${{ secrets.DEPLOY_KEY_PRIVATE_FOR_AXO_ETW}}
        run: ./scripts/prepare-private-modules-gha.sh

      - name: Verify
        run: make ci
